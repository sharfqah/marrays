<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var colors = ["blue", "white", "black","yellow", "orange", "black", "pink", "purple"];
        document.write(colors + "<br>")

        document.write(colors[0] + "<br>")
        document.write(colors[4] + "<br>")
        document.write(colors.length + "<br>")
        document.write(colors[7] + "<br>")
        document.write("<br>")

        document.write(colors.pop() + "<br>")
        document.write(colors.length + "<br>")
        document.write(colors + "<br>")
        document.write(colors.join(" || ") + "<br>")
        document.write(colors.push("teal") + "<br>")
        document.write(colors + "<br>")
        document.write(colors.shift() + "<br>")
        document.write(colors.sort() + "<br>")

       

    </script>
</body>
</html>
